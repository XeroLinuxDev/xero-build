title   Start The XeroLinux Installer (nVidia-Open - RTX Cards)
sort-key 03
linux    /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
initrd   /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
options  archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n driver=nonfreenonouveau radeon.modeset=1 i915.modeset=1 nvme_load=yes
